apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: finishline-app
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    spec:
      containers:
        - image: gcr.io/YOUR_PROJECT_ID/finishline-app:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: GEMINI_API_KEY
              value: "YOUR_GEMINI_API_KEY"
            - name: FIREBASE_SERVICE_ACCOUNT_KEY
              value: "YOUR_FIREBASE_SERVICE_ACCOUNT_KEY_JSON_STRING"
            - name: NEXT_PUBLIC_FIREBASE_API_KEY
              value: "YOUR_FIREBASE_API_KEY"
            - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
              value: "YOUR_FIREBASE_AUTH_DOMAIN"
            - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
              value: "YOUR_FIREBASE_PROJECT_ID"
            - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
              value: "YOUR_FIREBASE_STORAGE_BUCKET"
            - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
              value: "YOUR_FIREBASE_MESSAGING_SENDER_ID"
            - name: NEXT_PUBLIC_FIREBASE_APP_ID
              value: "YOUR_FIREBASE_APP_ID"
            - name: CRON_SECRET
              value: "YOUR_SECURE_CRON_SECRET"
